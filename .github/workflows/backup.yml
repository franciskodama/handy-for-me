name: Daily Database Backup

on:
  schedule:
    - cron: '0 7 * * *' # Every day at 3am EDT (7am UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the backup file
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Backup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_SECRET: ${{ secrets.BACKUP_SECRET }}
          GCS_PROJECT_ID: ${{ secrets.GCS_PROJECT_ID }}
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: yarn db:backup
